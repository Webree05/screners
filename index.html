                const root = document.documentElement;
                root.style.setProperty('--primary-color', themeColor);
                const r = parseInt(themeColor.slice(1, 3), 16);
                const g = parseInt(themeColor.slice(3, 5), 16);
                const b = parseInt(themeColor.slice(5, 7), 16);
                root.style.setProperty('--primary-rgb', `${r}, ${g}, ${b}`);
            }, [themeColor]);

            const onLogin = (u, p) => {
                if (u === "Adminscreners01" && p === "Sayaadminnya01") {
                    setIsLoggedIn(true);
                    setLoginError("");
                } else {
                    setLoginError("Akses ditolak. Periksa username dan password Anda.");
                }
            };
            const onLogout = () => setIsLoggedIn(false);

            const toggleWatchlist = (ticker) => {
                const updated = watchlist.includes(ticker) ? watchlist.filter(t => t !== ticker) : [...watchlist, ticker];
                setWatchlist(updated);
                localStorage.setItem("watchlist", JSON.stringify(updated));
            };

            // Unified Market Data Fetcher & Tick
            useEffect(() => {
                const fetchMarketData = async () => {
                    if (isFetchingRef.current) return;
                    isFetchingRef.current = true;
                    try {
                        const response = await fetch('market_data.json?t=' + Date.now());
                        const data = await response.json();

                        // Transform the object map into the internal array format needed by the UI
                        const updatedStocks = ALL_SECTOR_TICKERS.map(ticker => {
                            const raw = data[ticker + ".JK"] || data[ticker];
                            const sector = Object.keys(SECTOR_MAPPING).find(sec => SECTOR_MAPPING[sec].includes(ticker)) || "OTHER";

                            if (raw && raw.close && raw.close.length > 0) {
                                const prices = raw.close.filter(c => c !== null);
                                if (prices.length === 0) return { t: ticker, ap: 0, pct: 0, s: "WAIT...", sector };

                                const currentPrice = prices[prices.length - 1];
                                const prevClose = raw.chartPreviousClose || (prices.length > 1 ? prices[prices.length - 2] : currentPrice);
                                const pctChange = prevClose > 0 ? ((currentPrice - prevClose) / prevClose) * 100 : 0;

                                let signal = "Hold";
                                if (pctChange >= 3) signal = "Strong Buy";
                                else if (pctChange > 0.5) signal = "Buy";
                                else if (pctChange < -3) signal = "Strong Sell";
                                else if (pctChange < -0.5) signal = "Sell";

                                return { t: ticker, ap: currentPrice, pct: pctChange, s: signal, sector };
                            }
                            return { t: ticker, ap: 0, pct: 0, s: "WAIT...", sector };
                        });

                        // Specially handle IHSG (^JKSE) - Update existing if found to prevent duplicates
                        if (data['^JKSE']) {
                            const raw = data['^JKSE'];
                            const prices = raw.close.filter(c => c !== null);
                            if (prices.length > 0) {
                                const current = prices[prices.length - 1];
                                const prevClose = raw.chartPreviousClose || current;
                                const pct = ((current - prevClose) / prevClose) * 100;

                                const existIdx = updatedStocks.findIndex(s => s.t === 'IHSG');
                                if (existIdx !== -1) {
                                    updatedStocks[existIdx] = { ...updatedStocks[existIdx], ap: current, pct: pct, s: pct > 0 ? 'Buy' : 'Sell' };
                                } else {
                                    updatedStocks.push({ t: 'IHSG', ap: current, pct: pct, s: pct > 0 ? 'Buy' : 'Sell', sector: 'MARKET' });
                                }
                            }
                        }

                        // Macro updates (Optional based on data existence)
                        if (data['USDIDR=X']) {
                            const raw = data['USDIDR=X'];
                            if (raw.close) {
                                const current = raw.close[raw.close.length - 1];
                                if (current) {
                                    const prev = raw.chartPreviousClose || current;
                                    const pct = ((current - prev) / prev) * 100;
                                    setMacroData(p => ({ ...p, usd: { price: current.toLocaleString('id-ID'), change: (pct > 0 ? '+' : '') + pct.toFixed(2) + '%', isUp: pct > 0 } }));
                                }
                            }
                        }
                        if (data['GOLD=F']) {
                            const raw = data['GOLD=F'];
                            if (raw.close) {
                                const current = raw.close[raw.close.length - 1];
                                if (current) {
                                    const prev = raw.chartPreviousClose || current;
                                    const pct = ((current - prev) / prev) * 100;
                                    setMacroData(p => ({ ...p, gold: { price: current.toLocaleString('id-ID'), change: (pct > 0 ? '+' : '') + pct.toFixed(2) + '%', isUp: pct > 0 } }));
                                }
                            }
                        }

                        setStocks(updatedStocks);
                        setLastUpdated(new Date());
                    } catch (error) {
                        console.error('Market Processing Error:', error);
                    } finally {
                        isFetchingRef.current = false;
                    }
                };
                fetchMarketData();
                const interval = setInterval(() => { fetchMarketData(); setTick(t => t + 1); }, 1000);
                return () => clearInterval(interval);
            }, []);


            // PERFORMANCE OPTIMIZATION: Memoized Market Data & Calcs
            const { ihsgPrice, ihsgChange, isIhsgUp, filteredIhsg } = useMemo(() => {
                const ihsg = stocks.find(s => s.t === 'IHSG') || { ap: 7200.5, pct: 0.15 };
                return {
                    ihsgPrice: ihsg.ap.toLocaleString('id-ID'),
                    ihsgChange: (ihsg.pct > 0 ? '+' : '') + ihsg.pct.toFixed(2) + '%',
                    isIhsgUp: ihsg.pct >= 0,
                    filteredIhsg: ihsg
                };
            }, [stocks]);

            const displayStocks = useMemo(() => {
                const now = new Date(); const h = now.getHours(); const d = now.getDay();
                const isClosed = d === 0 || d === 6 || h < 9 || h >= 16;
                if (isClosed) return stocks;

                return stocks.map(stock => {
                    if (stock.ap <= 0 || stock.s === 'SUSPENDED' || stock.s === 'WAIT...' || stock.t === 'IHSG') return stock;
                    let seed = 0; for (let i = 0; i < stock.t.length; i++) seed += stock.t.charCodeAt(i);
                    if ((seed + tick) % 4 !== 0) return stock;
                    const maxNoise = Math.max(0.0005, Math.abs(stock.pct) * 0.0001);
                    const noise = Math.sin(seed * tick) * maxNoise;
                    const finalAp = Math.round(stock.ap * (1 + noise));
                    const prevClose = stock.ap / (1 + (stock.pct / 100));
                    const finalPct = prevClose > 0 ? ((finalAp - prevClose) / prevClose) * 100 : stock.pct;
                    return { ...stock, ap: finalAp, pct: finalPct };
                });
            }, [stocks, tick]);

            const validStocks = useMemo(() => displayStocks.filter(s => s.ap > 0), [displayStocks]);

            const sentimentData = useMemo(() => {
                const vs = validStocks;
                if (vs.length === 0) return { scoreStr: '0.00', color: 'primary', text: 'SCANNING', offset: 339.29 };
                const rawScore = (vs.reduce((sum, s) => sum + s.pct, 0) / vs.length / 1.5) * 0.4 + ((vs.filter(s => s.s.includes('Buy') || s.s === 'Hold').length - vs.filter(s => s.s.includes('Sell')).length) / vs.length) * 0.6;
                const finalScore = Math.max(-1, Math.min(1, rawScore));
                const offset = 339.29 * (1 - Math.max(0.05, Math.min(1, Math.abs(finalScore))));
                let text = 'NEUTRAL', color = 'primary';
                if (finalScore >= 0.4) { text = 'STRONG BULLISH'; color = 'success'; }
                else if (finalScore > 0.05) { text = 'BULLISH'; color = 'primary'; }
                else if (finalScore < -0.4) { text = 'STRONG BEARISH'; color = 'danger'; }
                else if (finalScore < -0.05) { text = 'BEARISH'; color = 'warning'; }
                return { scoreStr: (finalScore > 0 ? '+' : '') + finalScore.toFixed(2), color, text, offset };
            }, [validStocks]);

            const sectorPerformance = useMemo(() => {
                return Object.keys(SECTOR_MAPPING).reduce((acc, sec) => {
                    const secStocks = displayStocks.filter(s => s.sector === sec && s.ap > 0);
                    acc[sec] = secStocks.length === 0 ? 0 : secStocks.reduce((sum, s) => sum + s.pct, 0) / secStocks.length;
                    return acc;
                }, {});
            }, [displayStocks]);

            const indexValuations = useMemo(() => {
                return Object.keys(SECTOR_MAPPING).map(sec => {
                    const base = INDEX_BASES[sec] || INDEX_BASES["FINANCE"];
                    const price = base.basePrice * (1 + (sectorPerformance[sec] || 0) / 100);
                    const per = price / base.eps, pbv = price / base.bookValue, dy = (base.dividend / price) * 100;
                    let status = "Fair", valRatio = per / base.histPe;
                    if (per < base.histPe && per / base.growth < 1 && pbv < base.histPbv) status = "Undervalued";
                    else if (per > base.histPe && per / base.growth > 1.5) status = "Overvalued";
                    return { sector: sec, price, dy, per, pbv, status, valuationRatio: valRatio };
                }).sort((a, b) => b.valuationRatio - a.valuationRatio);
            }, [sectorPerformance]);

            const activeStockData = useMemo(() => {
                if (activeTicker === 'IHSG') return { pct: filteredIhsg.pct, s: isIhsgUp ? 'Buy' : 'Sell', p: '85%' };
                return displayStocks.find(s => s.t === activeTicker) || { pct: 0, s: 'Wait', p: '50%' };
            }, [activeTicker, displayStocks, filteredIhsg, isIhsgUp]);

            const signalLogic = useMemo(() => {
                const pVal = parseInt(activeStockData.p) || 50;
                const conds = [
                    { name: (activeStockData.s === 'Sell' || activeStockData.pct < 0) ? "Death Cross Alert" : "Golden Cross Active", active: activeStockData.s !== 'Wait' },
                    { name: "Net Foreign Volume Pulse", active: pVal > 60 || pVal < 40 },
                    { name: "Volatility Breakout Scan", active: Math.abs(activeStockData.pct) > 1.5 },
                    { name: "AI Sentiment Confirmation", active: Math.abs(parseFloat(sentimentData.scoreStr)) > 0.3 }
                ];
                let badgeText = "Neutral Zone", badgeColor = "text-slate-400 bg-slate-800";
                if (activeStockData.s === 'Buy') { badgeText = pVal > 75 ? "Strong Buy" : "Buy Setup"; badgeColor = "text-success bg-success/20"; }
                else if (activeStockData.s === 'Sell') { badgeText = "Sell / Avoiding"; badgeColor = "text-danger bg-danger/20"; }

                return { signalConditions: conds, logicBadgeColor: badgeColor, logicBadgeText: badgeText };
            }, [activeStockData, sentimentData.scoreStr]);

            const techMetrics = useMemo(() => {
                const pVal = parseInt(activeStockData.p) || 50;
                if (activeStockData.s === 'Sell') {
                    return {
                        ema: { text: "EMA Ribbon Downtrend", color: "bg-danger", textClass: "text-danger" },
                        mom: { text: "Momentum Phase Dump", color: "bg-warning", textClass: "text-warning" },
                        obv: { text: "OBV Distribution Active", color: "bg-danger", textClass: "text-danger" }
                    };
                } else if (activeStockData.s === 'Buy' && pVal > 80) {
                    return {
                        ema: { text: "EMA Ribbon Bullish Break", color: "bg-success", textClass: "text-success" },
                        mom: { text: "Momentum Squeeze Fire", color: "bg-success", textClass: "text-success" },
                        obv: { text: "OBV Strong Divergence", color: "bg-primary", textClass: "text-primary font-bold" }
                    };
                }
                return {
                    ema: { text: "EMA Ribbon (Trend) Active", color: "bg-primary", textClass: "text-slate-300" },
                    mom: { text: "Momentum Squeeze Wait", color: "bg-secondary", textClass: "text-slate-300" },
                    obv: { text: "OBV Validated", color: "bg-success", textClass: "text-slate-300" }
                };
            }, [activeStockData]);

            if (!isLoggedIn) {
                return <LoginPage onLogin={onLogin} loginError={loginError} />;
            }

            return (
                <div className="flex bg-[#0F172A] min-h-screen text-slate-100 overflow-hidden font-outfit">
                    <Sidebar
                        activeTab={activeTab}
                        setActiveTab={setActiveTab}
                        activeScreenerTab={activeScreenerTab}
                        setActiveScreenerTab={setActiveScreenerTab}
                        onLogout={onLogout}
                    />

                    <main className="flex-grow ml-24 h-screen overflow-y-auto custom-scrollbar transition-all duration-300">
                        {/* Header */}
                        <header className="sticky top-0 z-40 bg-[#0F172A]/80 backdrop-blur-md border-b border-slate-700/30 px-8 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <h2 className="text-xl font-black text-white tracking-tight uppercase flex items-center gap-2">
                                    <Icon name="chevron-right" className="text-primary w-5 h-5" />
                                    {activeTab}
                                </h2>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="hidden md:flex bg-slate-800/50 px-4 py-1.5 rounded-xl border border-slate-700/50 items-center gap-3">
                                    <span className="text-[10px] text-slate-500 font-black uppercase tracking-widest">IHSG</span>
                                    <div className="flex items-center gap-2">
                                        <span className={`font-black text-sm ${isIhsgUp ? 'text-success' : 'text-danger'}`}>{ihsgPrice}</span>
                                        <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${isIhsgUp ? 'bg-success/10 text-success' : 'bg-danger/10 text-danger'}`}>{ihsgChange}</span>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3 bg-slate-800/50 p-1.5 pr-4 rounded-xl border border-slate-700/50">
                                    <div className="w-8 h-8 rounded-lg bg-primary/20 flex items-center justify-center text-primary font-black border border-primary/20">A</div>
                                    <span className="text-xs font-black text-slate-200">ADMIN</span>
                                </div>
                            </div>
                        </header>

                        <div className="p-8 pb-32">
                            {activeTab === "Markets" && <MarketView {...{
                                stocks: displayStocks,
                                displayStocks: displayStocks, // Passed explicitly to prevent heatmap crash
                                tick, activeTicker, setActiveTicker, ihsgPrice, ihsgChange, isIhsgUp, macroData,
                                selectedValuationSector, setSelectedValuationSector, searchQuery, setSearchQuery, activeSector, setActiveSector,
                                watchlist, toggleWatchlist, sectorPerformance, indexValuations,
                                finalScoreStr: sentimentData.scoreStr, sentimentColor: sentimentData.color, sentimentText: sentimentData.text, sentimentDashOffset: sentimentData.offset,
                                validStocksCount: validStocks.length,
                                logicBadgeColor: signalLogic.logicBadgeColor, logicBadgeText: signalLogic.logicBadgeText, signalConditions: signalLogic.signalConditions,
                                techEma: techMetrics.ema, techMom: techMetrics.mom, techObv: techMetrics.obv
                            }} />}
                            {activeTab === "Watchlist" && <WatchlistView stocks={displayStocks} watchlist={watchlist} toggleWatchlist={toggleWatchlist} />}
                            {activeTab === "Screener" && (
                                <React.Fragment>
                                    {activeScreenerTab === "InflowOutflow" && <ScreenerView stocks={displayStocks} watchlist={watchlist} toggleWatchlist={toggleWatchlist} activeTicker={activeTicker} setActiveTicker={setActiveTicker} />}
                                    {activeScreenerTab === "DragonFlow" && <DragonFlowView stocks={displayStocks} watchlist={watchlist} toggleWatchlist={toggleWatchlist} activeTicker={activeTicker} setActiveTicker={setActiveTicker} />}
                                    {activeScreenerTab === "BrokerSummary" && <BrokerSummaryView stocks={displayStocks} watchlist={watchlist} activeTicker={activeTicker} setActiveTicker={setActiveTicker} />}
                                    {activeScreenerTab === "BidOffer" && <OrderbookView stocks={displayStocks} activeTicker={activeTicker} />}
                                </React.Fragment>
                            )}
                            {activeTab === "Portfolio" && <PortfolioView portfolio={portfolio} setPortfolio={setPortfolio} stocks={displayStocks} />}
                            {activeTab === "Stream" && <StreamView stocks={displayStocks} activeTicker={activeTicker} />}
                            {activeTab === "EIPO" && <EipoView />}
                            {activeTab === "Support" && <SupportView />}
                            {activeTab === "Settings" && <SettingsView themeColor={themeColor} setThemeColor={setThemeColor} />}
                        </div>
                    </main>
                </div>
            );
        }


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
