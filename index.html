<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEX IHSG Screener - AI Bullish/Bearish Signals</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary-color, #00F0FF)',
                        secondary: 'var(--secondary-color, #6C5CE7)',
                        background: '#0F172A',
                        card: '#1E293B',
                        success: '#10B981',
                        danger: '#EF4444',
                        warning: '#F59E0B'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --primary-color: #00F0FF;
            --secondary-color: #6C5CE7;
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background-color: #0F172A;
            color: #f8fafc;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .gradient-text {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .neon-border {
            box-shadow: 0 0 15px rgba(var(--primary-rgb, 0, 240, 255), 0.3), inset 0 0 5px rgba(var(--primary-rgb, 0, 240, 255), 0.1);
            border-color: rgba(var(--primary-rgb, 0, 240, 255), 0.4);
        }

        .sidebar-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-item:hover {
            transform: translateX(5px);
            background: rgba(var(--primary-rgb, 0, 240, 255), 0.1);
        }

        .sidebar-active {
            background: linear-gradient(to right, rgba(var(--primary-rgb, 0, 240, 255), 0.2), transparent);
            border-left: 3px solid var(--primary-color);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-float { animation: float 3s ease-in-out infinite; }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.2);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0F172A;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* High-Density Terminal Overrides */
        .w-24 { width: 4.5rem !important; }
        .ml-24 { margin-left: 4.5rem !important; }
        .p-8 { padding: 1.25rem !important; }
        .px-8 { padding-left: 1.25rem !important; padding-right: 1.25rem !important; }
        .py-6 { padding-top: 0.75rem !important; padding-bottom: 0.75rem !important; }
        .gap-6 { gap: 0.75rem !important; }
        .p-6 { padding: 1rem !important; }
        .p-5 { padding: 0.85rem !important; }
        .mb-6 { margin-bottom: 0.75rem !important; }
        .mb-4 { margin-bottom: 0.5rem !important; }
        .space-y-8 > :not([hidden]) ~ :not([hidden]) { margin-top: 1rem !important; }
        .space-y-6 > :not([hidden]) ~ :not([hidden]) { margin-top: 0.75rem !important; }
        
        /* Sidebar Shrink & Logo */
        aside.w-24 { width: 4.5rem !important; }
        aside .w-10 { width: 2rem !important; height: 2rem !important; }
        aside .text-\[10px\] { font-size: 7px !important; }
        aside .text-\[9px\] { font-size: 7px !important; }
        aside .py-4 { padding-top: 0.5rem !important; padding-bottom: 0.5rem !important; }
        aside .py-6 { padding-top: 0.75rem !important; padding-bottom: 0.75rem !important; }
        aside i { width: 1.1rem !important; height: 1.1rem !important; }
        
        /* Table Density */
        .py-3 { padding-top: 0.4rem !important; padding-bottom: 0.4rem !important; }
        .px-4 { padding-left: 0.6rem !important; padding-right: 0.6rem !important; }
        
        /* Heading Tighter */
        h2.text-3xl { font-size: 1.25rem !important; }
        h3.text-sm { font-size: 0.75rem !important; }
    </style>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- D3.js for Graph Logic -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;
        const { createChart } = window.LightweightCharts;

        // Simple SVG Icons
        const Icons = {
            TrendingUp: () => <lucide-icon name="trending-up" class="text-success"></lucide-icon>,
            TrendingDown: () => <lucide-icon name="trending-down" class="text-danger"></lucide-icon>,
            Activity: () => <lucide-icon name="activity" class="text-primary"></lucide-icon>,
            Target: () => <lucide-icon name="target" class="text-secondary"></lucide-icon>,
            Brain: () => <lucide-icon name="brain" class="text-primary"></lucide-icon>,
            Database: () => <lucide-icon name="database" class="text-warning"></lucide-icon>,
            Zap: () => <lucide-icon name="zap" class="text-warning"></lucide-icon>,
            User: () => <lucide-icon name="user" class="text-slate-400"></lucide-icon>,
            Dashboard: () => <lucide-icon name="layout-dashboard"></lucide-icon>,
            Eye: () => <lucide-icon name="eye"></lucide-icon>,
            Filter: () => <lucide-icon name="filter"></lucide-icon>,
            Briefcase: () => <lucide-icon name="briefcase"></lucide-icon>,
            Broker: () => <lucide-icon name="repeat"></lucide-icon>,
            Stream: () => <lucide-icon name="rss"></lucide-icon>,
            Eipo: () => <lucide-icon name="shopping-bag"></lucide-icon>,
            Chat: () => <lucide-icon name="message-square"></lucide-icon>,
            Settings: () => <lucide-icon name="settings"></lucide-icon>,
            Search: () => <lucide-icon name="search"></lucide-icon>,
            Lock: () => <lucide-icon name="lock"></lucide-icon>,
            Alert: () => <lucide-icon name="alert-triangle"></lucide-icon>,
            Check: () => <lucide-icon name="check-circle"></lucide-icon>,
            Star: ({ className = "" }) => (
                <svg className={className} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                </svg>
            ),
            PieChart: () => <lucide-icon name="pie-chart"></lucide-icon>,
            Menu: () => <lucide-icon name="menu"></lucide-icon>,
            BarChart: () => <lucide-icon name="bar-chart-2"></lucide-icon>,
            Headphones: () => <lucide-icon name="headphones"></lucide-icon>,
        };

        // Note: We use a custom wrapper for Lucide to make it work seamlessly with React
        const Icon = ({ name, className = "" }) => {
            // Check if we have a direct SVG replacement in our Icons object
            const lucideName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
            if (Icons[lucideName]) {
                const IconComp = Icons[lucideName];
                return <IconComp className={className} />;
            }
            return <i data-lucide={name} className={className}></i>;
        };

        const Card = ({ title, icon, children, className = "" }) => (
            <div className={`p-5 rounded-2xl glass-panel relative overflow-hidden group ${className}`}>
                <div className="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full blur-[50px] transform transition-transform group-hover:scale-150 duration-500"></div>
                <div className="flex items-center justify-between mb-4">
                    <h3 className="text-sm font-semibold tracking-wider text-slate-300 uppercase">{title}</h3>
                    {icon && <div className="p-2 bg-slate-800/50 rounded-lg">{icon}</div>}
                </div>
                <div className="relative z-10">
                    {children}
                </div>
            </div>
        );

        const ChartWidget = ({ ticker }) => {
            const chartContainerRef = useRef();
            const [timeframe, setTimeframe] = useState('1D');
            const [chartType, setChartType] = useState('Candle'); // Added Chart Type state
            const [chartInstance, setChartInstance] = useState(null);
            const [seriesInstance, setSeriesInstance] = useState(null);
            const [lineSeriesInstance, setLineSeriesInstance] = useState(null);
            const [emaSeriesInstance, setEmaSeriesInstance] = useState(null);

            useEffect(() => {
                if (!chartContainerRef.current) return;

                const chart = createChart(chartContainerRef.current, {
                    layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#94a3b8' },
                    grid: { vertLines: { color: 'rgba(51, 65, 85, 0.2)' }, horzLines: { color: 'rgba(51, 65, 85, 0.2)' } },
                    width: chartContainerRef.current.clientWidth,
                    height: 500,
                    crosshair: { mode: 0 },
                    rightPriceScale: { 
                        borderColor: 'rgba(51, 65, 85, 0.5)', 
                        autoScale: true,
                        visible: true,
                    },
                    timeScale: { 
                        borderColor: 'rgba(51, 65, 85, 0.5)', 
                        timeVisible: true, 
                        secondsVisible: true,
                        shiftVisibleRangeOnNewBar: true,
                        rightOffset: 20,
                        barSpacing: 2,
                    },
                    handleScroll: {
                        mouseWheel: true,
                        pressedMouseButton: 1,
                        horzTouchDrag: true,
                        vertTouchDrag: true,
                    },
                    handleScale: {
                        axisPressedMouseButton: 1,
                        mouseWheel: true,
                        pinch: true,
                    },
                });

                const handleResize = () => { chart.applyOptions({ width: chartContainerRef.current.clientWidth }); };

                const candlestickSeries = chart.addCandlestickSeries({ upColor: '#10B981', downColor: '#EF4444', borderVisible: false, wickUpColor: '#10B981', wickDownColor: '#EF4444' });
                const lineSeries = chart.addLineSeries({ color: '#10B981', lineWidth: 2, crosshairMarkerVisible: true, visible: false });
                const emaSeries = chart.addLineSeries({ color: '#00F0FF', lineWidth: 2, crosshairMarkerVisible: false });

                setChartInstance(chart); setSeriesInstance(candlestickSeries); setLineSeriesInstance(lineSeries); setEmaSeriesInstance(emaSeries);
                window.addEventListener('resize', handleResize);
                return () => { window.removeEventListener('resize', handleResize); chart.remove(); };
            }, []);

            useEffect(() => {
                if (seriesInstance && lineSeriesInstance) {
                    if (chartType === 'Candle') {
                        seriesInstance.applyOptions({ visible: true });
                        lineSeriesInstance.applyOptions({ visible: false });
                    } else {
                        seriesInstance.applyOptions({ visible: false });
                        lineSeriesInstance.applyOptions({ visible: true });
                    }
                }
            }, [chartType, seriesInstance, lineSeriesInstance]);

            useEffect(() => {
                let intervalId; let isMounted = true;
                const fetchRealData = async (tf) => {
                    let interval = '1d'; let range = '1y';
                    if (tf === '1S' || tf === '1M') { interval = '1m'; range = '5d'; }
                    else if (tf === '1H') { interval = '1h'; range = '1mo'; }
                    else if (tf === '1D') { interval = '1d'; range = '1y'; }
                    else if (tf === '1Mo') { interval = '1mo'; range = '5y'; }

                    const actualTicker = ticker === 'IHSG' ? '^JKSE' : `${ticker}.JK`;
                    const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${actualTicker}?interval=${interval}&range=${range}`;
                    const url = `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}&disableCache=true&_=${Date.now()}`;

                    try {
                        const res = await fetch(`proxy.php?url=${encodeURIComponent(yfUrl)}&_=${Date.now()}`);
                        if (!res.ok) return [];
                        const json = await res.json();
                        if (!json.chart || !json.chart.result || json.chart.result.length === 0) return [];
                        const result = json.chart.result[0];
                        const timestamps = result.timestamp || [];
                        const quote = result.indicators.quote[0];

                        let formattedData = [];
                        for (let i = 0; i < timestamps.length; i++) {
                            if (quote.close[i] !== null) {
                                let t = timestamps[i];
                                
                                // Adjust timezone to Indonesia/Jakarta (UTC+7) for intraday data
                                // This ensures the market opens at 09:00 instead of 02:00 (UTC)
                                if (timeframe !== '1D' && timeframe !== '1Mo') {
                                    t += 7 * 3600;
                                }

                                // Normalisasi timestamp harian/bulanan agar tidak mencetak rentetan candle fake ke kanan
                                if (timeframe === '1D' || timeframe === '1Mo') {
                                    const d = new Date(t * 1000);
                                    t = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                                }
                                formattedData.push({ time: t, open: quote.open[i], high: quote.high[i], low: quote.low[i], close: quote.close[i] });
                            }
                        }
                        
                        const uniqueData = []; 
                        const mapTime = {};
                        for (let d of formattedData) {
                            if (!mapTime[d.time]) {
                                mapTime[d.time] = { ...d };
                                uniqueData.push(mapTime[d.time]);
                            } else {
                                // Timpa data existing agar intraday ticks di-update di candle yang sama
                                const exist = mapTime[d.time];
                                exist.high = Math.max(exist.high, d.high);
                                exist.low = Math.min(exist.low, d.low);
                                exist.close = d.close;
                            }
                        }
                        return uniqueData;
                    } catch (e) { return []; }
                };

                const loadData = async () => {
                    if (!seriesInstance || !emaSeriesInstance || !chartInstance) return;

                    const data = await fetchRealData(timeframe);
                    if (!isMounted || data.length === 0) return;

                    seriesInstance.setData(data);
                    
                    if (lineSeriesInstance) {
                        const lineData = data.map(d => ({ time: d.time, value: d.close }));
                        lineSeriesInstance.setData(lineData);
                    }

                    // --- NEW LOGIC: Fibonacci & EMA Setup (Markers Removed) ---
                    const emaData = [];
                    const period = 50;
                    let k = 2 / (period + 1);
                    let ema = data[0].close;
                    for (let i = 0; i < data.length; i++) {
                        ema = (data[i].close - ema) * k + ema;
                        emaData.push({ time: data[i].time, value: ema });
                    }
                    emaSeriesInstance.setData(emaData);

                    const visibleCandles = timeframe === '1S' || timeframe === '1M' ? 420 : 100;
                    const fromTime = data[Math.max(0, data.length - visibleCandles)].time;
                    const toTime = data[data.length - 1].time + (timeframe === '1S' ? 60 : 0);
                    chartInstance.timeScale().setVisibleRange({ from: fromTime, to: toTime });

                    if (timeframe === '1S') {
                        let currentCandle = { ...data[data.length - 1] };
                        let lastSavedTime = currentCandle.time;

                        intervalId = setInterval(() => {
                            const nowSeconds = Math.floor(Date.now() / 1000);
                            const lastIntervalTime = Math.floor(nowSeconds / 60) * 60;
                            if (lastIntervalTime > lastSavedTime) {
                                lastSavedTime = lastIntervalTime;
                                const change = (Math.random() - 0.5) * 5;
                                const newPrice = currentCandle.close + change;
                                currentCandle = { time: lastIntervalTime, open: currentCandle.close, high: Math.max(currentCandle.close, newPrice), low: Math.min(currentCandle.close, newPrice), close: newPrice };
                            } else {
                                const change = (Math.random() - 0.5) * 5;
                                const newPrice = currentCandle.close + change;
                                currentCandle.high = Math.max(currentCandle.high, newPrice);
                                currentCandle.low = Math.min(currentCandle.low, newPrice);
                                currentCandle.close = newPrice;
                            }
                            if (seriesInstance) seriesInstance.update(currentCandle);
                            if (lineSeriesInstance) lineSeriesInstance.update({ time: currentCandle.time, value: currentCandle.close });
                        }, 1000);
                    } else {
                        intervalId = setInterval(async () => {
                            try {
                                const latestData = await fetchRealData(timeframe);
                                if (!isMounted || latestData.length === 0) return;
                                const latestCandle = latestData[latestData.length - 1];
                                if (latestCandle && seriesInstance) { 
                                    seriesInstance.update(latestCandle); 
                                    if (lineSeriesInstance) lineSeriesInstance.update({ time: latestCandle.time, value: latestCandle.close });
                                }
                            } catch (e) { }
                        }, 30000);
                    }
                };

                loadData();

                return () => { isMounted = false; if (intervalId) clearInterval(intervalId); };
            }, [timeframe, ticker, seriesInstance, lineSeriesInstance, emaSeriesInstance, chartInstance]);

            return (
                <div className="flex flex-col h-full">
                    <div className="flex justify-between items-center mb-4">
                        <div className="flex gap-2">
                             <button
                                 onClick={() => setChartType('Candle')}
                                 className={`px-4 py-1.5 text-xs font-semibold rounded-lg transition-all ${chartType === 'Candle' ? 'bg-secondary text-white shadow-[0_0_10px_rgba(108,92,231,0.4)]' : 'bg-slate-800/80 text-slate-400 hover:bg-slate-700 hover:text-white border border-slate-700'}`}
                             >
                                 Candle
                             </button>
                             <button
                                 onClick={() => setChartType('Line')}
                                 className={`px-4 py-1.5 text-xs font-semibold rounded-lg transition-all ${chartType === 'Line' ? 'bg-secondary text-white shadow-[0_0_10px_rgba(108,92,231,0.4)]' : 'bg-slate-800/80 text-slate-400 hover:bg-slate-700 hover:text-white border border-slate-700'}`}
                             >
                                 Line
                             </button>
                        </div>
                        <div className="flex justify-end gap-2">
                            {['1S', '1M', '1H', '1D', '1Mo'].map(tf => (
                                <button
                                    key={tf}
                                    onClick={() => setTimeframe(tf)}
                                    className={`px-4 py-1.5 text-xs font-semibold rounded-lg transition-all ${timeframe === tf ? 'bg-primary text-[#0F172A] shadow-[0_0_10px_rgba(0,240,255,0.4)]' : 'bg-slate-800/80 text-slate-400 hover:bg-slate-700 hover:text-white border border-slate-700'}`}
                                >
                                    {tf === '1S' ? '1 Detik' : tf === '1M' ? '1 Menit' : tf === '1H' ? '1 Jam' : tf === '1D' ? '1 Hari' : '1 Bulan'}
                                </button>
                            ))}
                        </div>
                    </div>
                    <div ref={chartContainerRef} className="w-full h-[520px]" />
                </div>
            );
        };

        const THEME_COLORS = [
            { name: "Hitam", hex: "#000000" }, { name: "Putih", hex: "#FFFFFF" }, { name: "Abu-abu", hex: "#64748B" },
            { name: "Coklat", hex: "#78350F" }, { name: "Pink", hex: "#EC4899" }, { name: "Lavender", hex: "#A78BFA" },
            { name: "Navy", hex: "#1E3A8A" }, { name: "Sky Blue", hex: "#0EA5E9" }, { name: "Hijau Tua", hex: "#064E3B" },
            { name: "Hijau Muda", hex: "#22C55E" }, { name: "Krem", hex: "#FDE68A" }, { name: "Emas", hex: "#D4AF37" },
            { name: "Perak", hex: "#C0C0C0" }
        ];

        const SECTOR_MAPPING = {
            "TECHNOLOGY": ["IHSG", "GOTO", "EMTK", "BUKA", "WIFI", "MLPT", "DCII", "BELI", "GLVA", "AWAN", "TRON", "PGJO", "TECH", "KREN", "MCAS", "NFCX", "DIVA", "LUCK", "ZATA", "SEGE", "IRSX"],
            "ENERGY": ["BREN", "BYAN", "ADRO", "PTBA", "PGAS", "MEDC", "AKRA", "ITMG", "HRUM", "PTRO", "ENRG", "TOBA", "INDY", "DOID", "ABMM", "DEWA", "BUMI", "BOSS", "BIPI", "APEX", "SMMT", "DSSA", "RUIS", "SGER", "GTBO", "TCPI", "WINS", "MBSS", "BULL", "CANI", "ELSA", "ESSA", "PKPK", "FIRE", "KOPI", "SURE", "DWGL", "CNKO", "MITI", "PSAB"],
            "BASIC-IND": ["AMMN", "INTP", "SMGR", "ANTM", "MDKA", "INCO", "BRPT", "TPIA", "INKP", "TKIM", "ESSA", "KRAS", "SMBR", "DKFT", "MBMA", "ARCI", "CITA", "IFSH", "ZINC", "TINS", "NIKL", "JKSW", "ALMI", "ALDO", "FASW", "SPMA", "KDSI", "SWAT", "IGAR", "TALF", "TRST", "AKPI", "SRSN", "ETWA", "SULI", "TIRT"],
            "INFRASTRUC": ["TLKM", "TOWR", "TBIG", "EXCL", "ISAT", "JSMR", "MTEL", "WIKA", "PTPP", "ADHI", "WSKT", "META", "CMNP", "SUPR", "BALI", "CENT", "WEGE", "WTON", "PPRE", "ACST", "DGIK", "TOPS", "NRCA", "JKON", "TOTL", "CSIS", "BUKK", "OASA", "KBLI", "KBLM", "VOKS", "SCCO", "CCSI", "PORT", "BATA", "KIJA", "DSSA"],
            "HEALTH": ["KLBF", "HEAL", "MIKA", "SILO", "PRDA", "SIDO", "PEHA", "KAEF", "INAF", "OMED", "CARE", "SAME", "RSGK", "BMHS", "IRRA", "DGNS", "MEJA", "SRAJ", "DVLA", "PURA", "TSPC", "PYFA", "MERK", "SCPI"],
            "INDUSTRIAL": ["ASII", "UNTR", "HEXA", "MARK", "BMHS", "KINO", "MLBI", "AUTO", "SMSM", "IMAS", "GJTL", "MASA", "GDYR", "BRAM", "LPIN", "SMCB", "ARNA", "KIAS", "LION", "TRIS", "BELL", "RICY", "SBMA", "TFCO", "IKBI", "BTON", "JRSPT", "AMFG", "TOTO"],

        const ScreenerView = ({ stocks, watchlist, toggleWatchlist, activeTicker, setActiveTicker }) => {
            // Ticker state synchronized with global controller

            
            // Deterministic Flow Logic (Ultra Fast & Stable)
            const calculateFlow = useCallback((ticker, timeframe) => {
                if (!ticker) return { inflow: 0, outflow: 0, netFlow: 0, strength: 50, signal: "NEUTRAL" };
                const tStr = ticker + timeframe;
                let hash = 0;
                for (let i = 0; i < tStr.length; i++) {
                    hash = ((hash << 5) - hash) + tStr.charCodeAt(i);
                    hash |= 0;
                }
                const seed = Math.abs(hash);
                const baseVal = (seed % 400) + 150;
                
                // Varied Inflow/Outflow for realistic data
                const inflowMult = (seed % 100) / 100;
                const outflowMult = ((seed * 1.3) % 100) / 100;
                
                const inflow = baseVal * inflowMult;
                const outflow = baseVal * outflowMult;
                const netFlow = inflow - outflow;
                const strength = (inflow / (inflow + outflow + 0.1)) * 100;
                
                let signal = "BALANCED";
                if (strength > 70) signal = "STRONG ACCUMULATION";
                else if (strength > 55) signal = "NET INFLOW";
                else if (strength > 45) signal = "NEUTRAL";
                else if (strength > 25) signal = "NET OUTFLOW";
                else signal = "STRONG DISTRIBUTION";

                return { inflow, outflow, netFlow, strength, signal };
            }, []);

            // UseMemo to prevent lag on price updates
            const { selectedData, finalScore, finalSignal } = useMemo(() => {

                const d1 = calculateFlow(activeTicker, "1d");
                const mo1 = calculateFlow(activeTicker, "1mo");
                
                const score = (m1.strength * 0.2) + (h1.strength * 0.25) + (d1.strength * 0.3) + (mo1.strength * 0.25);

                    selectedData: { m1, h1, d1, mo1 },
                    finalScore: score,
                    finalSignal: score > 50 ? "ACCUMULATION" : "DISTRIBUTION"

            const hasData = stocks && stocks.length > 0;
            
            const [screenerSearch, setScreenerSearch] = useState("");

            const topPerformers = useMemo(() => {

                // 1. Kalo ada yang diketik di kotak cari (screenerSearch)
                // 2. Kalo nggak ada, liat apa yang dipilih di Dropdown (activeTicker)
                let baseStocks = stocks;
                const activeSearch = screenerSearch || activeTicker;
                
                if (activeSearch) {
                    const searchLower = activeSearch.toUpperCase();
                    baseStocks = stocks.filter(s => 
                        s.t.includes(searchLower) || 
                        (s.sector && s.sector.toUpperCase().includes(searchLower))
                    );
                }

                // Optimal depth for speed + accuracy
                const depth = activeSearch ? 200 : 200;
                
                const results = baseStocks
                    .slice(0, depth)
                    .map(s => {
                        const t1 = calculateFlow(s.t, "1m");
                        const t2 = calculateFlow(s.t, "1h");
                        const t3 = calculateFlow(s.t, "1d");
                        const t4 = calculateFlow(s.t, "1mo");
                        const score = (t1.strength * 0.2) + (t2.strength * 0.25) + (t3.strength * 0.3) + (t4.strength * 0.25);
                        return { ...s, t1, t2, t3, t4, score, conclusion: score > 50 ? "ACCUMULATION" : "DISTRIBUTION" };
                    });

                if (activeSearch) {
                    return results.sort((a,b) => b.score - a.score).slice(0, 50);
                }
                
                return results.sort((a,b) => b.score - a.score).slice(0, 15);
            }, [stocks, hasData, calculateFlow, screenerSearch, activeTicker]);

            return (
                <div className="space-y-8 animate-in fade-in slide-in-from-bottom-6 duration-700">
                    {/* Professional Header ala Bloomberg/TradingView Terminal */}
                    <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 bg-[#0B121E] p-8 rounded-[2.5rem] border border-slate-800/50 shadow-2xl relative overflow-hidden group">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-[100px] -mr-32 -mt-32"></div>
                        <div className="relative z-10">
                            <h2 className="text-3xl font-black text-white tracking-tight flex items-center gap-3">
                                InflowOutflow<span className="text-primary">Analyzer</span> Master v3.0
                            </h2>

                    const priceVar = (random() - 0.5) * 0.25 * (i/11);

                const freeFloat = (5 + (seed % 55)).toFixed(1);

            const [loginData, setLoginData] = useState({ username: "", password: "" });
            const [loginError, setLoginError] = useState("");
            const [activeTab, setActiveTab] = useState("Markets");
            const [activeScreenerTab, setActiveScreenerTab] = useState("InflowOutflow");
            const [themeColor, setThemeColor] = useState(() => localStorage.getItem("themeColor") || "#00F0FF");
            
            // Centralized Icon Update Cycle - Prevent browser hang
            useEffect(() => {
                if (window.lucide) {
                    lucide.createIcons();
                }
            }, [activeTab]);

            const [stocks, setStocks] = useState(initialStocks);
            const [watchlist, setWatchlist] = useState(() => {
                try { return JSON.parse(localStorage.getItem("watchlist") || "[]"); } catch(e) { return []; }
            });
            const [portfolio, setPortfolio] = useState(() => {
                try { return JSON.parse(localStorage.getItem("portfolio") || "[]"); } catch(e) { return []; }
            });
            
            const [tick, setTick] = useState(0);
            const [activeTicker, setActiveTicker] = useState("IHSG");
            const [searchQuery, setSearchQuery] = useState("");
            const [activeSector, setActiveSector] = useState("ALL");
            const [selectedValuationSector, setSelectedValuationSector] = useState("ALL");
            const [lastUpdated, setLastUpdated] = useState(new Date());

            // Macro Data state with defaults to prevent crashes
            const [macroData, setMacroData] = useState({
                usd: { price: '16.245', change: '+0.12%', isUp: true },
                biRate: { price: '6.25%', change: '0.00%', isUp: false },
                gold: { price: '2.342,5', change: '-0.45%', isUp: false }
            });

            // UseRef for fetching guard
            const isFetchingRef = useRef(false);

            // CSS Variable Theme Injection
            useEffect(() => {
                const root = document.documentElement;
                root.style.setProperty('--primary-color', themeColor);
                const r = parseInt(themeColor.slice(1, 3), 16);
                const g = parseInt(themeColor.slice(3, 5), 16);
                const b = parseInt(themeColor.slice(5, 7), 16);
                root.style.setProperty('--primary-rgb', `${r}, ${g}, ${b}`);
            }, [themeColor]);

            const onLogin = (u, p) => {
                if (u === "Adminscreners01" && p === "Sayaadminnya01") {
                    setIsLoggedIn(true);
                    setLoginError("");
                } else {
                    setLoginError("Akses ditolak. Periksa username dan password Anda.");
                }
            };
            const onLogout = () => setIsLoggedIn(false);

            const toggleWatchlist = (ticker) => {
                const updated = watchlist.includes(ticker) ? watchlist.filter(t => t !== ticker) : [...watchlist, ticker];
                setWatchlist(updated);
                localStorage.setItem("watchlist", JSON.stringify(updated));
            };

            // Unified Market Data Fetcher & Tick
            useEffect(() => {
                const fetchMarketData = async () => {
                    if (isFetchingRef.current) return;
                    isFetchingRef.current = true;
                    try {
                        const response = await fetch('market_data.json?t=' + Date.now());
                        const data = await response.json();
                        
                        // Transform the object map into the internal array format needed by the UI
                        const updatedStocks = ALL_SECTOR_TICKERS.map(ticker => {
                            const raw = data[ticker + ".JK"] || data[ticker];
                            const sector = Object.keys(SECTOR_MAPPING).find(sec => SECTOR_MAPPING[sec].includes(ticker)) || "OTHER";
                            
                            if (raw && raw.close && raw.close.length > 0) {
                                const prices = raw.close.filter(c => c !== null);
                                if (prices.length === 0) return { t: ticker, ap: 0, pct: 0, s: "WAIT...", sector };
                                
                                const currentPrice = prices[prices.length - 1];
                                const prevClose = raw.chartPreviousClose || (prices.length > 1 ? prices[prices.length - 2] : currentPrice);
                                const pctChange = prevClose > 0 ? ((currentPrice - prevClose) / prevClose) * 100 : 0;
                                
                                let signal = "Hold";
                                if (pctChange >= 3) signal = "Strong Buy";
                                else if (pctChange > 0.5) signal = "Buy";
                                else if (pctChange < -3) signal = "Strong Sell";
                                else if (pctChange < -0.5) signal = "Sell";

                                return { t: ticker, ap: currentPrice, pct: pctChange, s: signal, sector };
                            }
                            return { t: ticker, ap: 0, pct: 0, s: "WAIT...", sector };
                        });

                        // Specially handle IHSG (^JKSE) - Update existing if found to prevent duplicates
                        if (data['^JKSE']) {
                            const raw = data['^JKSE'];
                            const prices = raw.close.filter(c => c !== null);
                            if (prices.length > 0) {
                                const current = prices[prices.length - 1];
                                const prevClose = raw.chartPreviousClose || current;
                                const pct = ((current - prevClose) / prevClose) * 100;
                                
                                const existIdx = updatedStocks.findIndex(s => s.t === 'IHSG');
                                if (existIdx !== -1) {
                                    updatedStocks[existIdx] = { ...updatedStocks[existIdx], ap: current, pct: pct, s: pct > 0 ? 'Buy' : 'Sell' };
                                } else {
                                    updatedStocks.push({ t: 'IHSG', ap: current, pct: pct, s: pct > 0 ? 'Buy' : 'Sell', sector: 'MARKET' });
                                }
                            }
                        }

                        // Macro updates (Optional based on data existence)
                        if (data['USDIDR=X']) {
                            const raw = data['USDIDR=X'];
                            if (raw.close) {
                                const current = raw.close[raw.close.length-1];
                                if (current) {
                                    const prev = raw.chartPreviousClose || current;
                                    const pct = ((current - prev) / prev) * 100;
                                    setMacroData(p => ({ ...p, usd: { price: current.toLocaleString('id-ID'), change: (pct > 0 ? '+' : '') + pct.toFixed(2) + '%', isUp: pct > 0 } }));
                                }
                            }
                        }
                        if (data['GOLD=F']) {
                            const raw = data['GOLD=F'];
                            if (raw.close) {
                                const current = raw.close[raw.close.length-1];
                                if (current) {
                                    const prev = raw.chartPreviousClose || current;
                                    const pct = ((current-prev)/prev)*100;
                                    setMacroData(p => ({ ...p, gold: { price: current.toLocaleString('id-ID'), change: (pct > 0 ? '+' : '') + pct.toFixed(2) + '%', isUp: pct > 0 } }));
                                }
                            }
                        }

                        setStocks(updatedStocks);
                        setLastUpdated(new Date());
                    } catch (error) { 
                        console.error('Market Processing Error:', error); 
                    } finally {
                        isFetchingRef.current = false;
                    }
                };
                fetchMarketData();
                const interval = setInterval(() => { fetchMarketData(); setTick(t => t + 1); }, 1000);
                return () => clearInterval(interval);
            }, []);


            // PERFORMANCE OPTIMIZATION: Memoized Market Data & Calcs
            const { ihsgPrice, ihsgChange, isIhsgUp, filteredIhsg } = useMemo(() => {
                const ihsg = stocks.find(s => s.t === 'IHSG') || { ap: 7200.5, pct: 0.15 };
                return {
                    ihsgPrice: ihsg.ap.toLocaleString('id-ID'),
                    ihsgChange: (ihsg.pct > 0 ? '+' : '') + ihsg.pct.toFixed(2) + '%',
                    isIhsgUp: ihsg.pct >= 0,
                    filteredIhsg: ihsg
                };
            }, [stocks]);

            const displayStocks = useMemo(() => {
                const now = new Date(); const h = now.getHours(); const d = now.getDay();
                const isClosed = d === 0 || d === 6 || h < 9 || h >= 16;
                if (isClosed) return stocks;
                
                return stocks.map(stock => {
                    if (stock.ap <= 0 || stock.s === 'SUSPENDED' || stock.s === 'WAIT...' || stock.t === 'IHSG') return stock;
                    let seed = 0; for (let i = 0; i < stock.t.length; i++) seed += stock.t.charCodeAt(i);
                    if ((seed + tick) % 4 !== 0) return stock; 
                    const maxNoise = Math.max(0.0005, Math.abs(stock.pct) * 0.0001);
                    const noise = Math.sin(seed * tick) * maxNoise;
                    const finalAp = Math.round(stock.ap * (1 + noise));
                    const prevClose = stock.ap / (1 + (stock.pct / 100));
                    const finalPct = prevClose > 0 ? ((finalAp - prevClose)/prevClose)*100 : stock.pct;
                    return { ...stock, ap: finalAp, pct: finalPct };
                });
            }, [stocks, tick]);

            const validStocks = useMemo(() => displayStocks.filter(s => s.ap > 0), [displayStocks]);

            const sentimentData = useMemo(() => {
                const vs = validStocks;
                if (vs.length === 0) return { scoreStr: '0.00', color: 'primary', text: 'SCANNING', offset: 339.29 };
                const rawScore = (vs.reduce((sum, s) => sum + s.pct, 0) / vs.length / 1.5) * 0.4 + ((vs.filter(s => s.s.includes('Buy') || s.s === 'Hold').length - vs.filter(s => s.s.includes('Sell')).length) / vs.length) * 0.6;
                const finalScore = Math.max(-1, Math.min(1, rawScore));
                const offset = 339.29 * (1 - Math.max(0.05, Math.min(1, Math.abs(finalScore))));
                let text = 'NEUTRAL', color = 'primary';
                if (finalScore >= 0.4) { text = 'STRONG BULLISH'; color = 'success'; }
                else if (finalScore > 0.05) { text = 'BULLISH'; color = 'primary'; }
                else if (finalScore < -0.4) { text = 'STRONG BEARISH'; color = 'danger'; }
                else if (finalScore < -0.05) { text = 'BEARISH'; color = 'warning'; }
                return { scoreStr: (finalScore > 0 ? '+' : '') + finalScore.toFixed(2), color, text, offset };
            }, [validStocks]);

            const sectorPerformance = useMemo(() => {
                return Object.keys(SECTOR_MAPPING).reduce((acc, sec) => {
                    const secStocks = displayStocks.filter(s => s.sector === sec && s.ap > 0);
                    acc[sec] = secStocks.length === 0 ? 0 : secStocks.reduce((sum, s) => sum + s.pct, 0) / secStocks.length;
                    return acc;
                }, {});
            }, [displayStocks]);

            const indexValuations = useMemo(() => {
                return Object.keys(SECTOR_MAPPING).map(sec => {
                    const base = INDEX_BASES[sec] || INDEX_BASES["FINANCE"];
                    const price = base.basePrice * (1 + (sectorPerformance[sec] || 0) / 100);
                    const per = price / base.eps, pbv = price / base.bookValue, dy = (base.dividend / price) * 100;
                    let status = "Fair", valRatio = per / base.histPe;
                    if (per < base.histPe && per/base.growth < 1 && pbv < base.histPbv) status = "Undervalued";
                    else if (per > base.histPe && per/base.growth > 1.5) status = "Overvalued";
                    return { sector: sec, price, per, pbv, dy, status, valuationRatio: valRatio };
                }).sort((a,b) => b.valuationRatio - a.valuationRatio);
            }, [sectorPerformance]);

            const activeStockData = useMemo(() => {
                if (activeTicker === 'IHSG') return { pct: filteredIhsg.pct, s: isIhsgUp ? 'Buy' : 'Sell', p: '85%' };
                return displayStocks.find(s => s.t === activeTicker) || { pct: 0, s: 'Wait', p: '50%' };
            }, [activeTicker, displayStocks, filteredIhsg, isIhsgUp]);

            const signalLogic = useMemo(() => {
                const pVal = parseInt(activeStockData.p) || 50;
                const conds = [
                    { name: (activeStockData.s === 'Sell' || activeStockData.pct < 0) ? "Death Cross Alert" : "Golden Cross Active", active: activeStockData.s !== 'Wait' },
                    { name: "Net Foreign Volume Pulse", active: pVal > 60 || pVal < 40 },
                    { name: "Volatility Breakout Scan", active: Math.abs(activeStockData.pct) > 1.5 },
                    { name: "AI Sentiment Confirmation", active: Math.abs(parseFloat(sentimentData.scoreStr)) > 0.3 }
                ];
                let badgeText = "Neutral Zone", badgeColor = "text-slate-400 bg-slate-800";
                if (activeStockData.s === 'Buy') { badgeText = pVal > 75 ? "Strong Buy" : "Buy Setup"; badgeColor = "text-success bg-success/20"; }
                else if (activeStockData.s === 'Sell') { badgeText = "Sell / Avoiding"; badgeColor = "text-danger bg-danger/20"; }
                
                return { signalConditions: conds, logicBadgeColor: badgeColor, logicBadgeText: badgeText };
            }, [activeStockData, sentimentData.scoreStr]);

            const techMetrics = useMemo(() => {
                const pVal = parseInt(activeStockData.p) || 50;
                if (activeStockData.s === 'Sell') {
                    return {
                        ema: { text: "EMA Ribbon Downtrend", color: "bg-danger", textClass: "text-danger" },
                        mom: { text: "Momentum Phase Dump", color: "bg-warning", textClass: "text-warning" },
                        obv: { text: "OBV Distribution Active", color: "bg-danger", textClass: "text-danger" }
                    };
                } else if (activeStockData.s === 'Buy' && pVal > 80) {
                    return {
                        ema: { text: "EMA Ribbon Bullish Break", color: "bg-success", textClass: "text-success" },
                        mom: { text: "Momentum Squeeze Fire", color: "bg-success", textClass: "text-success" },
                        obv: { text: "OBV Strong Divergence", color: "bg-primary", textClass: "text-primary font-bold" }
                    };
                }
                return {
                    ema: { text: "EMA Ribbon (Trend) Active", color: "bg-primary", textClass: "text-slate-300" },
                    mom: { text: "Momentum Squeeze Wait", color: "bg-secondary", textClass: "text-slate-300" },
                    obv: { text: "OBV Validated", color: "bg-success", textClass: "text-slate-300" }
                };
            }, [activeStockData]);

            if (!isLoggedIn) {
                return <LoginPage onLogin={onLogin} loginError={loginError} />;
            }

            return (
                <div className="flex bg-[#0F172A] min-h-screen text-slate-100 overflow-hidden font-outfit">
                    <Sidebar 
                        activeTab={activeTab} 
                        setActiveTab={setActiveTab} 
                        activeScreenerTab={activeScreenerTab} 
                        setActiveScreenerTab={setActiveScreenerTab} 
                        onLogout={onLogout} 
                    />
                    
                    <main className="flex-grow ml-24 h-screen overflow-y-auto custom-scrollbar transition-all duration-300">
                        {/* Header */}
                        <header className="sticky top-0 z-40 bg-[#0F172A]/80 backdrop-blur-md border-b border-slate-700/30 px-8 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <h2 className="text-xl font-black text-white tracking-tight uppercase flex items-center gap-2">
                                    <Icon name="chevron-right" className="text-primary w-5 h-5" />
                                    {activeTab}
                                </h2>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="hidden md:flex bg-slate-800/50 px-4 py-1.5 rounded-xl border border-slate-700/50 items-center gap-3">
                                    <span className="text-[10px] text-slate-500 font-black uppercase tracking-widest">IHSG</span>
                                    <div className="flex items-center gap-2">
                                        <span className={`font-black text-sm ${isIhsgUp ? 'text-success' : 'text-danger'}`}>{ihsgPrice}</span>
                                        <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${isIhsgUp ? 'bg-success/10 text-success' : 'bg-danger/10 text-danger'}`}>{ihsgChange}</span>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3 bg-slate-800/50 p-1.5 pr-4 rounded-xl border border-slate-700/50">
                                    <div className="w-8 h-8 rounded-lg bg-primary/20 flex items-center justify-center text-primary font-black border border-primary/20">A</div>
                                    <span className="text-xs font-black text-slate-200">ADMIN</span>
                                </div>
                            </div>
                        </header>

                        <div className="p-8 pb-32">
                            {activeTab === "Markets" && <MarketView {...{
                                stocks: displayStocks, 
                                displayStocks: displayStocks, // Passed explicitly to prevent heatmap crash
                                tick, activeTicker, setActiveTicker, ihsgPrice, ihsgChange, isIhsgUp, macroData, 
                                selectedValuationSector, setSelectedValuationSector, searchQuery, setSearchQuery, activeSector, setActiveSector, 
                                watchlist, toggleWatchlist, sectorPerformance, indexValuations, 
                                finalScoreStr: sentimentData.scoreStr, sentimentColor: sentimentData.color, sentimentText: sentimentData.text, sentimentDashOffset: sentimentData.offset, 
                                validStocksCount: validStocks.length, 
                                logicBadgeColor: signalLogic.logicBadgeColor, logicBadgeText: signalLogic.logicBadgeText, signalConditions: signalLogic.signalConditions, 
                                techEma: techMetrics.ema, techMom: techMetrics.mom, techObv: techMetrics.obv
                            }} />}
                            {activeTab === "Watchlist" && <WatchlistView stocks={displayStocks} watchlist={watchlist} toggleWatchlist={toggleWatchlist} />}
                            {activeTab === "Screener" && (
                                <React.Fragment>
                                    {activeScreenerTab === "InflowOutflow" && <ScreenerView stocks={displayStocks} watchlist={watchlist} toggleWatchlist={toggleWatchlist} activeTicker={activeTicker} setActiveTicker={setActiveTicker} />}
                                    {activeScreenerTab === "CatchDragon" && <CatchTheDragonView stocks={displayStocks} watchlist={watchlist} toggleWatchlist={toggleWatchlist} activeTicker={activeTicker} setActiveTicker={setActiveTicker} />}
                                    {activeScreenerTab === "BrokerSummary" && <BrokerSummaryView stocks={displayStocks} watchlist={watchlist} activeTicker={activeTicker} setActiveTicker={setActiveTicker} />}
                                    {activeScreenerTab === "BidOffer" && <OrderbookView stocks={displayStocks} activeTicker={activeTicker} />}
                                </React.Fragment>
                            )}
                            {activeTab === "Portfolio" && <PortfolioView portfolio={portfolio} setPortfolio={setPortfolio} stocks={displayStocks} />}
                            {activeTab === "Stream" && <StreamView stocks={displayStocks} activeTicker={activeTicker} />}
                            {activeTab === "EIPO" && <EipoView />}
                            {activeTab === "Support" && <SupportView />}
                            {activeTab === "Settings" && <SettingsView themeColor={themeColor} setThemeColor={setThemeColor} />}
                        </div>
                    </main>
                </div>
            );
        }


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
